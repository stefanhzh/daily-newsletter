version: 2

briefing_defaults:
  timezone: Asia/Shanghai
  default_lookback_hours: 24
  background_max_hours: 72
  target_visible_items: 24

quality_policy:
  prefer_primary_sources: true
  require_cross_check_for_material_claims: true
  allow_social_for_discovery_only: true
  prefer_official_source_as_cluster_primary: true

user_source_preferences:
  core_source_ids:
    - bloomberg
    - reuters
    - caixin
    - yicai
    - financial-times
    - wall-street-journal
    - the-information
    - hkex
    - sse
    - szse
  discovery_source_ids:
    - wechat-cyber-zen
    - wechat-digital-life-khazix
    - wechat-zeping-macro
    - cnbc
    - ap
    - cailian

tiers:
  T1:
    description: "Primary official or near-primary sources. Highest authority for verification and cluster primacy."
    default_weight: 1.2
    default_threshold_delta: -3
  T1_5:
    description: "High-quality secondary official channels or strong market media. Useful for discovery, but noisier than T1."
    default_weight: 1.05
    default_threshold_delta: 0
  T2:
    description: "Discovery-oriented media, sector press, and KOL sources. Useful for recall, but not ideal as final primary evidence."
    default_weight: 0.9
    default_threshold_delta: 4

source_groups:
  official:
    preferred_for_primary_item: true
    default_role: verification
  regulator:
    preferred_for_primary_item: true
    default_role: verification
  exchange:
    preferred_for_primary_item: true
    default_role: verification
  wire:
    preferred_for_primary_item: true
    default_role: discovery_and_verification
  media:
    preferred_for_primary_item: false
    default_role: discovery_and_context
  sector_media:
    preferred_for_primary_item: false
    default_role: directed_monitoring
  social:
    preferred_for_primary_item: false
    default_role: discovery_only
  kol:
    preferred_for_primary_item: false
    default_role: discovery_only

discovery_profiles:
  global_macro_geopolitics:
    description: "Default broad scan for geopolitics, macro, policy, and cross-asset developments."
    source_ids:
      - reuters
      - bloomberg
      - financial-times
      - wall-street-journal
      - ap
      - fed
      - ecb
      - us-treasury
      - mofcom
      - pboc
  china_market_policy:
    description: "China and Hong Kong policy, market structure, and financing environment."
    source_ids:
      - caixin
      - yicai
      - cailian
      - csrc
      - ndrc
      - miit
      - samr
      - cac
      - hkex
      - sse
      - szse
  technology_ai_semiconductor:
    description: "Technology and AI coverage for investors, not consumer-tech chatter."
    source_ids:
      - reuters
      - bloomberg
      - openai-blog
      - anthropic-news
      - google-blog
      - company-ir-pages
      - techcrunch
      - y-combinator
      - the-information
  capital_markets_transactions:
    description: "IPO, refinancing, M&A, credit, and transaction-related developments."
    source_ids:
      - reuters
      - bloomberg
      - wall-street-journal
      - sec-filings
      - hkex
      - csrc
      - company-ir-pages
      - caixin

